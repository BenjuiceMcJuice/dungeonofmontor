var DARK_TIERS = { void_: true }

function drawSprite(canvas, sprite, tierKey, scale) {
  var tier = TIERS[tierKey]
  if (!tier) return
  var px = scale || 4
  canvas.width = sprite.cols * px
  canvas.height = sprite.rows * px
  canvas.style.imageRendering = 'pixelated'
  var ctx = canvas.getContext('2d')

  if (DARK_TIERS[tierKey]) {
    ctx.fillStyle = '#1a1a2e'
    ctx.fillRect(0, 0, canvas.width, canvas.height)
  }

  for (var r = 0; r < sprite.rows; r++) {
    for (var c = 0; c < sprite.cols; c++) {
      var cell = sprite.grid[r][c]
      if (cell === null) continue
      if (cell === 'C') ctx.fillStyle = tier.hex
      else if (cell === 'S') ctx.fillStyle = tier.shadow
      else ctx.fillStyle = cell
      ctx.fillRect(c * px, r * px, px, px)
    }
  }
}

var tierKeys = ['dust', 'slate', 'iron', 'crimson', 'void_']

for (var si = 0; si < spriteKeys.length; si++) {

  var section = document.createElement('div')

  var row = document.createElement('div')
  row.className = 'sprite-row'

  for (var ti = 0; ti < tierKeys.length; ti++) {
    var tierKey = tierKeys[ti]
    var tier = TIERS[tierKey]
    var card = document.createElement('div')
    card.className = 'sprite-card'
    var canvas = document.createElement('canvas')
    drawSprite(canvas, sprite, tierKey, 4)
    card.appendChild(canvas)
    var label = document.createElement('div')
    label.className = 'name'
    label.textContent = tier.name
    card.appendChild(label)
    row.appendChild(card)
  }

  section.appendChild(row)
  output.appendChild(section)
}
</script>
</body>
</html>
